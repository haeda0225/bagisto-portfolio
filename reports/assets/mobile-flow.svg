<svg width="360" height="225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobile-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f6c5c;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0f6c5c;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="225" fill="url(#mobile-grad)"/>

  <!-- Phone outline -->
  <rect x="140" y="30" width="80" height="140" rx="8" fill="#fff" stroke="#0f6c5c" stroke-width="2"/>

  <!-- Screen -->
  <rect x="145" y="40" width="70" height="110" rx="4" fill="#f3efe6"/>

  <!-- Home icon -->
  <circle cx="180" cy="55" r="3" fill="#0f6c5c"/>
  <text x="180" y="70" font-family="Arial, sans-serif" font-size="7" fill="#1e1f1c" text-anchor="middle">Home</text>

  <!-- Product cards -->
  <rect x="150" y="75" width="20" height="15" rx="2" fill="#fff" stroke="#d9d0bd"/>
  <rect x="175" y="75" width="20" height="15" rx="2" fill="#fff" stroke="#d9d0bd"/>
  <rect x="200" y="75" width="20" height="15" rx="2" fill="#fff" stroke="#d9d0bd"/>

  <!-- Cart icon -->
  <circle cx="180" cy="105" r="4" fill="#b55d3d" opacity="0.3"/>
  <text x="180" y="120" font-family="Arial, sans-serif" font-size="7" fill="#1e1f1c" text-anchor="middle">Cart</text>

  <!-- Bottom nav -->
  <rect x="145" y="155" width="70" height="10" rx="2" fill="#0f6c5c" opacity="0.1"/>

  <!-- Flow arrows -->
  <path d="M 180 165 L 260 185" stroke="#0f6c5c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 100 185 L 180 165" stroke="#0f6c5c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Marker for arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f6c5c" />
    </marker>
  </defs>

  <!-- Labels -->
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="11" fill="#1e1f1c" font-weight="bold">Login</text>
  <text x="270" y="195" font-family="Arial, sans-serif" font-size="11" fill="#1e1f1c" font-weight="bold">Order</text>

  <!-- Title -->
  <text x="180" y="20" font-family="Arial, sans-serif" font-size="14" fill="#0f6c5c" text-anchor="middle" font-weight="bold">Mobile App Flow</text>
</svg>
